# 敏感信息配置
# 推荐方式：通过 Jenkins credentials 动态创建，不要将真实密码提交到 Git
#
# 动态创建命令：
#   kubectl create secret generic eify-secret \
#     --from-literal=PG_USERNAME=postgres \
#     --from-literal=PG_PASSWORD=<your-password> \
#     --from-literal=REDIS_PASSWORD=<your-password> \
#     --from-literal=JWT_SECRET=<your-jwt-secret> \
#     --from-literal=CRYPTO_KEK=<your-crypto-kek> \
#     --from-literal=EMBEDDING_API_KEY=<your-api-key> \
#     -n eify --dry-run=client -o yaml | kubectl apply -f -
#
# 手动创建（不推荐，仅用于测试）：
#   1. 编码：echo -n 'your-value' | base64
#   2. 将编码后的值填入下方 data 字段
#   3. kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: eify-secret
  namespace: eify
  labels:
    app: eify
type: Opaque
data:
  # ⚠️ 以下是占位符，部署前必须替换为实际值的 base64 编码
  # 生成方式：echo -n 'your-real-value' | base64
  PG_USERNAME: <base64-encoded-username>
  PG_PASSWORD: <base64-encoded-password>
  REDIS_PASSWORD: <base64-encoded-password>
  JWT_SECRET: <base64-encoded-jwt-secret>
  EMBEDDING_API_KEY: <base64-encoded-api-key>
  CRYPTO_KEK: <base64-encoded-crypto-kek>
