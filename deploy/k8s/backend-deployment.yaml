apiVersion: apps/v1
kind: Deployment
metadata:
  name: eify-backend
  namespace: eify
  labels:
    app: eify
    component: backend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eify
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: eify
        component: backend
        version: v1
    spec:
      containers:
        - name: eify-backend
          image: swr.cn-south-1.myhuaweicloud.com/eify/eify-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eify-config
            - secretRef:
                name: eify-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
      restartPolicy: Always
      dnsPolicy: ClusterFirst
