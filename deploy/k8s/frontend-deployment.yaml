apiVersion: apps/v1
kind: Deployment
metadata:
  name: eify-frontend
  namespace: eify
  labels:
    app: eify
    component: frontend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eify
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: eify
        component: frontend
        version: v1
    spec:
      containers:
        - name: eify-frontend
          image: swr.cn-south-1.myhuaweicloud.com/eify/eify-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
