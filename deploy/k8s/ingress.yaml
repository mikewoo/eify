apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eify-ingress
  namespace: eify
  labels:
    app: eify
  annotations:
    # Request body size limit (50MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Proxy timeouts for long-running requests (SSE, LLM calls)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # SSE support: disable proxy buffering (required for streaming responses)
    # Uncomment this line when deploying the chat module with SSE streaming support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # SSL redirect — uncomment once TLS is configured via cert-manager
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager TLS — uncomment when cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # TLS configuration — uncomment and configure after cert-manager is ready
  # tls:
  #   - hosts:
  #       - <YOUR_DOMAIN>
  #     secretName: eify-tls
  rules:
    # Replace <YOUR_DOMAIN> with actual domain
    - host: <YOUR_DOMAIN>
      http:
        paths:
          # Backend API routes
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: eify-backend
                port:
                  number: 8080
          # Frontend catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eify-frontend
                port:
                  number: 80
