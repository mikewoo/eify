version: '3.8'

services:
  # ========== Jaeger All-in-One ==========
  # 包含 Jaeger Agent、Collector、Query UI
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: eify-jaeger
    ports:
      # Jaeger UI (Web 界面)
      - "16686:16686"
      # Jaeger Collector HTTP
      - "14268:14268"
      # Jaeger Collector gRPC
      - "14250:14250"
      # Jaeger Agent Compact Thrift
      - "6831:6831/udp"
      # Jaeger Agent Binary Thrift
      - "6832:6832/udp"
      # OTLP gRPC (OpenTelemetry Protocol)
      - "4317:4317"
      # OTLP HTTP (OpenTelemetry Protocol)
      - "4318:4318"
      # Jaeger Admin Server (健康检查等)
      - "14269:14269"
      # Zipkin Compact Thrift (兼容 Zipkin)
      - "5775:5775/udp"
      # Zipkin HTTP (兼容 Zipkin)
      - "9411:9411"
    environment:
      # SPAN 存储类型
      - SPAN_STORAGE_TYPE=memory
      # 日志级别
      - LOG_LEVEL=info
      # 环境名称
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      # 启用健康检查
      - ADMIN_SERVER_HTTP_PORT=14269
    networks:
      - eify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  eify-network:
    driver: bridge
    name: eify-network

# 使用说明：
# 1. 启动 Jaeger: docker-compose -f deploy/docker-compose-jaeger.yml up -d
# 2. 查看 Jaeger UI: http://localhost:16686
# 3. 查看健康状态: curl http://localhost:14269/metrics
# 4. 停止 Jaeger: docker-compose -f deploy/docker-compose-jaeger.yml down
