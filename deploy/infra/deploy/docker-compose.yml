# 使用方式：docker-compose -f deploy/docker-compose.yml up -d
# 前置条件：已构建后端 JAR（mvn clean package -DskipTests）
# 数据库迁移由 Flyway 在应用启动时自动执行，无需手动导入 init.sql


services:
  redis:
    image: redis:7-alpine
    container_name: eify-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: eify-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PGVECTOR_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE:-eify}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../../..
      dockerfile: deploy/Dockerfile
    container_name: eify-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET_required}
      CRYPTO_KEK: ${CRYPTO_KEK:?CRYPTO_KEK_required}
      PG_URL: jdbc:postgresql://pgvector:5432/${PG_DATABASE:-eify}?stringtype=unspecified
      PG_USERNAME: ${PGVECTOR_USERNAME:-postgres}
      PG_PASSWORD: ${PGVECTOR_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../..
      dockerfile: deploy/Dockerfile.web
    container_name: eify-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  pgvector-data:
