# 使用方式：docker-compose -f deploy/docker-compose.yml up -d
# 前置条件：已构建后端 JAR（mvn clean package -DskipTests）
# 数据库迁移由 Flyway 在应用启动时自动执行，无需手动导入 init.sql


services:
  mysql:
    image: mysql:8.0
    container_name: eify-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD_required}
      MYSQL_DATABASE: eify
    volumes:
      - mysql-data:/var/lib/mysql

    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eify-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: eify-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PGVECTOR_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-eify_vector}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../../..
      dockerfile: deploy/Dockerfile
    container_name: eify-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET_required}
      CRYPTO_KEK: ${CRYPTO_KEK:?CRYPTO_KEK_required}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: eify
      MYSQL_URL: jdbc:mysql://mysql:3306/eify?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD_required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      PGVECTOR_HOST: ${PGVECTOR_HOST:-pgvector}
      PGVECTOR_PORT: ${PGVECTOR_PORT:-5432}
      PGVECTOR_DATABASE: ${PGVECTOR_DATABASE:-eify_vector}
      PGVECTOR_USERNAME: ${PGVECTOR_USERNAME:-postgres}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../..
      dockerfile: deploy/Dockerfile.web
    container_name: eify-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  pgvector-data:
