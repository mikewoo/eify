server:
  port: 8080

spring:
  application:
    name: eify

  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/eify?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${MYSQL_URL:jdbc:mysql://localhost:3306/eify?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      username: ${MYSQL_USERNAME:}
      password: ${MYSQL_PASSWORD:}
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 监控统计（默认关闭，仅开发环境按需开启；生产环境禁止）
      stat-view-servlet:
        enabled: false
        url-pattern: /druid/*
        reset-enable: false
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
      # 连接属性（启用 SQL 统计）
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0

  # PostgreSQL 数据源（pgvector 向量库）
  datasource-pgvector:
    url: ${PGVECTOR_URL:jdbc:postgresql://localhost:5432/eify_vector?stringtype=unspecified}
    username: ${PGVECTOR_USERNAME:postgres}
    password: ${PGVECTOR_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # 禁止 SQL 自动初始化（避免 pgvector 数据源初始化失败导致启动中断）
  sql:
    init:
      mode: never

  autoconfigure:
    exclude: []

# 应用配置（版本由 Maven 构建时自动注入，不要手动修改）
app:
  version: @project.version@

# ========== Micrometer Tracing + OpenTelemetry 配置 ==========
management:
  tracing:
    sampling:
      probability: 0.1  # 10% 采样率（生产环境推荐）
    enabled: true
    brave:
      enabled: true
    propagation:
      type: b3
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      service.version: ${app.version}
      deployment.environment: ${spring.profiles.active:default}
    tracing:
      exporter:
        otlp:
          endpoint: http://localhost:4317
          protocol: grpc
          timeout: 30s
          max-queue-size: 2048
          max-export-batch-size: 512
      sampler:
        probability: 0.1

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 扫描路径
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 实体类扫描路径
  type-aliases-package: com.eify.*.domain.entity
  # TypeHandler 扫描路径
  type-handlers-package: com.eify.common.handler
  configuration:
    # 驼峰转下划线
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键类型（AUTO 自增）
      id-type: AUTO
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置（使用 logback-spring.xml 中的统一格式）
logging:
  config: classpath:logback-spring.xml
  # 日志级别配置（可通过环境特定配置覆盖）
  # 可选级别：TRACE, DEBUG, INFO, WARN, ERROR
  level:
    # 根日志级别（默认 INFO）
    root: INFO
    # eify 应用日志（默认 INFO，环境特定配置可覆盖）
    com.eify: INFO
    # MyBatis 日志（默认 INFO）
    org.mybatis: INFO
    # MyBatis-Plus 日志（默认 INFO）
    com.baomidou.mybatisplus: INFO
    # Spring 框架日志（默认 INFO）
    org.springframework: INFO

# ========== 消息队列日志配置 ==========
mq:
  logging:
    # 是否记录消息体（默认 true）
    # 设置为 false 可以避免序列化开销，提高性能
    record-payload: true
    # 消息体最大长度（字符数，默认 1000）
    # 超过此长度的消息体会被截断并添加 "...(truncated)" 后缀
    max-payload-length: 1000
    # 是否记录完整错误堆栈（默认 false）
    # 设置为 true 会记录完整堆栈，便于排查问题
    record-full-stack: false
    # 堆栈最大深度（行数，默认 50）
    # 当 record-full-stack = true 时有效
    max-stack-depth: 50
    # 默认采样率（默认 0.1，即 10%）
    # 可通过消息级别覆盖此配置
    sampling-rate: 0.1
    # 慢消息阈值（毫秒，默认 1000ms）
    # 超过此阈值的消息会被完整记录，不受采样率限制
    slow-message-threshold: 1000

# ========== SQL 日志配置 ==========
sql:
  logging:
    # 是否启用 SQL 日志（默认 true）
    enabled: true
    # 慢查询阈值（毫秒，默认 1000ms）
    # 超过此阈值的查询会被完整记录，不受采样率限制
    slow-query-threshold: 1000
    # SQL 最大长度（字符数，默认 2000）
    # 超过此长度的 SQL 会被截断
    max-sql-length: 2000
    # 采样率（默认 0.1，即 10%）
    # 慢查询不受采样率限制，始终记录
    sampling-rate: 0.1
    # 是否记录参数（默认 true）
    # 慢查询始终记录完整参数
    record-params: true
    # 是否记录完整错误堆栈（默认 false）
    record-full-stack: false
    # 堆栈最大深度（行数，默认 50）
    max-stack-depth: 50

# ========== 请求日志配置 ==========
req:
  logging:
    # 是否记录请求体（默认 true）
    record-request: true
    # 是否记录响应体（默认 false，避免性能开销）
    record-response: false
    # 响应体最大长度（默认 1000 字符）
    max-response-length: 1000
    # 错误响应是否完整记录（默认 true）
    record-error-response: true
    # 成功响应是否完整记录（默认 false，只记录摘要）
    record-success-response: false
    # 成功响应摘要长度（默认 200 字符）
    success-preview-length: 200
    # 成功响应采样率（默认 0.01，即 1%）
    sampling-rate: 0.01
    # 是否启用异步请求日志（默认 true）
    async-logging-enabled: true

# ========== Knife4j API 文档配置 ==========
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.eify

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: Eify API

# ========== 知识库配置 ==========
knowledge:
  embedding:
    # 嵌入模型提供商：openai, ollama, custom
    provider: openai
    # 模型名称（阿里云 DashScope text-embedding-v4）
    model: text-embedding-v4
    # 向量维度（text-embedding-v4 输出 1024 维）
    dimension: 1024
    # API 端点（阿里云 DashScope OpenAI 兼容模式）
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
    # API Key（支持环境变量覆盖）
    api-key: ${EMBEDDING_API_KEY:}
    # 超时时间（毫秒）
    timeout: 30000
    # 最大批大小（DashScope 限制最大 10）
    max-batch-size: 10
