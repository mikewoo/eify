name: CI

on:
  push:
    branches: [main, alpha, beta, rc]
    tags: ['v*']
  pull_request:
    branches: [main, alpha, beta, rc]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn verify -pl eify-app -am -DskipTests=false
        env:
          PG_URL: jdbc:postgresql://localhost:5432/eify?stringtype=unspecified
          PG_USERNAME: postgres
          PG_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          SPRING_PROFILES_ACTIVE: test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eify-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: eify-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Type Check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: mvn package -pl eify-app -am -DskipTests
        env:
          PG_URL: jdbc:postgresql://localhost:5432/eify?stringtype=unspecified
          PG_USERNAME: postgres
          PG_PASSWORD: postgres

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: eify-web/package-lock.json

      - name: Build Frontend
        run: |
          cd eify-web
          npm ci
          npm run build
          tar -czf ../eify-web-dist.tar.gz dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            eify-app/target/eify-app-*.jar
            eify-web-dist.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
