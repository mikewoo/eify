name: CI

on:
  push:
    branches: [main, alpha, beta, rc]
    tags: ['v*']
  pull_request:
    branches: [main, alpha, beta, rc]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eify
        ports:
          - 3306:3306
        options: --health-cmd "mysqladmin ping -h localhost" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn verify -pl eify-app -am -DskipTests=false
        env:
          MYSQL_URL: jdbc:mysql://localhost:3306/eify?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: root
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          SPRING_PROFILES_ACTIVE: test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eify-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: eify-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Type Check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: mvn package -pl eify-app -am -DskipTests
        env:
          MYSQL_URL: jdbc:mysql://localhost:3306/eify
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: root

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: eify-web/package-lock.json

      - name: Build Frontend
        run: |
          cd eify-web
          npm ci
          npm run build
          tar -czf ../eify-web-dist.tar.gz dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            eify-app/target/eify-app-*.jar
            eify-web-dist.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
